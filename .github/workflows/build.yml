name: Build LG V30 Kernel (Stable KSU-Next) + Droidspaces

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出优化内核源码（KernelSU Next 手动 hooks）
        uses: actions/checkout@v4
        with:
          repository: TosteRino/joan-kernelsu
          path: joan-kernelsu

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl xz-utils \
            build-essential ccache \
            libncurses5-dev libssl-dev libelf-dev \
            bison flex bc python3

      - name: 下载 AOSP GCC 4.9 工具链
        run: |
          mkdir -p $HOME/toolchain
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            --depth=1 $HOME/toolchain/aarch64-linux-android-4.9
          echo "$HOME/toolchain/aarch64-linux-android-4.9/bin" >> $GITHUB_PATH

      - name: 启用 ccache 加速
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: joan-kernelsu-ccache
          max-size: 5G

      - name: 应用 Droidspaces non-GKI 补丁
        working-directory: joan-kernelsu
        run: |
          wget -q -O d1.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/non-GKI/01.fix_kernel_panic_in_xt_qtaguid.patch
          wget -q -O d2.patch "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/non-GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch"
          patch -p1 < d1.patch
          patch -p1 < d2.patch
          echo "✅ Droidspaces 补丁已应用"

      - name: 创建 Droidspaces 配置片段
        working-directory: joan-kernelsu
        run: |
          {
            echo "# ==================== IPC ===================="
            echo "CONFIG_SYSCTL=y"
            echo "CONFIG_SYSVIPC=y"
            echo "CONFIG_POSIX_MQUEUE=y"
            echo ""
            echo "# ==================== 命名空间 ===================="
            echo "CONFIG_NAMESPACES=y"
            echo "CONFIG_IPC_NS=y"
            echo "CONFIG_PID_NS=y"
            echo "CONFIG_UTS_NS=y"
            echo "CONFIG_USER_NS=y"
            echo "CONFIG_NET_NS=y"
            echo ""
            echo "# ==================== Cgroup 完整支持 ===================="
            echo "CONFIG_CGROUPS=y"
            echo "CONFIG_CGROUP_DEVICE=y"
            echo "CONFIG_CGROUP_PIDS=y"
            echo "CONFIG_CGROUP_FREEZER=y"
            echo "CONFIG_CGROUP_CPUACCT=y"
            echo "CONFIG_CGROUP_SCHED=y"
            echo "CONFIG_FAIR_GROUP_SCHED=y"
            echo "CONFIG_CGROUP_NET_PRIO=y"
            echo "CONFIG_MEMCG=y"
            echo "CONFIG_CPUSETS=y"
            echo ""
            echo "# ==================== 设备文件系统 ===================="
            echo "CONFIG_DEVTMPFS=y"
            echo "CONFIG_DEVTMPFS_MOUNT=y"
            echo ""
            echo "# ==================== 网络隔离（Droidspaces 核心） ===================="
            echo "CONFIG_VETH=y"
            echo "CONFIG_BRIDGE=y"
            echo "CONFIG_BRIDGE_NETFILTER=y"
            echo "CONFIG_NETFILTER=y"
            echo "CONFIG_NETFILTER_ADVANCED=y"
            echo "CONFIG_NF_CONNTRACK=y"
            echo "CONFIG_NF_NAT=y"
            echo "CONFIG_NF_TABLES=y"
            echo "CONFIG_IP_NF_IPTABLES=y"
            echo "CONFIG_IP_NF_FILTER=y"
            echo "CONFIG_IP_NF_NAT=y"
            echo "CONFIG_IP_NF_TARGET_MASQUERADE=y"
            echo "CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y"
            echo "CONFIG_NETFILTER_XT_TARGET_TCPMSS=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y"
            echo "CONFIG_NETFILTER_XT_MATCH_STATE=y"
            echo "CONFIG_NF_CONNTRACK_NETLINK=y"
            echo "CONFIG_NF_NAT_REDIRECT=y"
            echo "CONFIG_IP_ADVANCED_ROUTER=y"
            echo "CONFIG_IP_MULTIPLE_TABLES=y"
            echo "CONFIG_NF_CONNTRACK_IPV4=y"
            echo "CONFIG_NF_NAT_IPV4=y"
            echo ""
            echo "# ==================== 文件系统 ===================="
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_EXT4_FS=y"
            echo "CONFIG_EXT4_FS_POSIX_ACL=y"
            echo "CONFIG_TMPFS=y"
            echo "CONFIG_TMPFS_XATTR=y"
            echo "CONFIG_TMPFS_POSIX_ACL=y"
            echo ""
            echo "# ==================== Firmware 加载 ===================="
            echo "CONFIG_FW_LOADER=y"
            echo "CONFIG_FW_LOADER_USER_HELPER=y"
            echo ""
            echo "# ==================== 安全 ===================="
            echo "CONFIG_SECCOMP=y"
            echo "CONFIG_SECCOMP_FILTER=y"
            echo ""
            echo "# ==================== 关键修复 ===================="
            echo "CONFIG_ANDROID_PARANOID_NETWORK=n"
          } > arch/arm64/configs/droidspaces.config
          echo "✅ Droidspaces 配置片段已创建"

      - name: 合并配置并解析依赖
        working-directory: joan-kernelsu
        run: |
          ./scripts/kconfig/merge_config.sh -m -O out \
            arch/arm64/configs/msm8998_defconfig \
            arch/arm64/configs/droidspaces.config
          make ARCH=arm64 O=./out olddefconfig
          grep -E "CONFIG_KSU=|CONFIG_NETFILTER=|CONFIG_NAMESPACES=|CONFIG_CGROUPS=" out/.config
          echo "✅ 配置合并完成"

      - name: 编译内核
        working-directory: joan-kernelsu
        run: |
          make ARCH=arm64 O=./out olddefconfig
          make ARCH=arm64 O=./out \
            CROSS_COMPILE=aarch64-linux-android- \
            CC="ccache aarch64-linux-android-gcc" \
            Image.gz-dtb -j$(nproc --all) 2>&1 | tee build.log
          echo "✅ 编译完成"

      - name: 检查编译产物
        working-directory: joan-kernelsu
        run: |
          ls -lh out/arch/arm64/boot/
          file out/arch/arm64/boot/Image.gz-dtb

      - name: AnyKernel3 打包
        working-directory: joan-kernelsu
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          echo 'kernel.string=LG V30 Stable KSU-Next + Droidspaces $(date +%Y%m%d)' > anykernel.sh
          echo 'do.devicecheck=1' >> anykernel.sh
          echo 'device.name1=joan' >> anykernel.sh
          echo 'device.name2=H930' >> anykernel.sh
          echo 'device.name3=H930DS' >> anykernel.sh
          echo 'device.name4=US998' >> anykernel.sh
          echo 'block=/dev/block/bootdevice/by-name/boot' >> anykernel.sh
          echo 'is_slot_device=0' >> anykernel.sh
          echo 'ramdisk_compression=gzip' >> anykernel.sh
          echo 'patch_vbmeta_flag=auto' >> anykernel.sh
          zip -r9 ../LG-V30-Stable-KSU-Droidspaces-$(date +%Y%m%d).zip ./*
          cd ..
          echo "✅ AnyKernel3 刷机包已生成"

      - name: 上传刷机包
        uses: actions/upload-artifact@v4
        with:
          name: LG-V30-Flashable-ZIP
          path: joan-kernelsu/LG-V30-Stable-KSU-Droidspaces-*.zip
          if-no-files-found: error

      - name: 上传原始内核镜像
        uses: actions/upload-artifact@v4
        with:
          name: LG-V30-Raw-Image.gz-dtb
          path: joan-kernelsu/out/arch/arm64/boot/Image.gz-dtb

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: joan-kernelsu/build.log