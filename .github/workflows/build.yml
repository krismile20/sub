name: Build LG V30 Kernel (Stable KSU-Next) + Droidspaces

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出优化内核源码（KernelSU Next 手动 hooks）
        uses: actions/checkout@v4
        with:
          repository: TosteRino/joan-kernelsu
          path: joan-kernelsu

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl xz-utils \
            build-essential ccache \
            libncurses5-dev libssl-dev libelf-dev \
            bison flex bc python3

      - name: 下载 AOSP GCC 4.9 工具链
        run: |
          mkdir -p $HOME/toolchain
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            --depth=1 $HOME/toolchain/aarch64-linux-android-4.9
          echo "$HOME/toolchain/aarch64-linux-android-4.9/bin" >> $GITHUB_PATH

      - name: 启用 ccache 加速
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: joan-kernelsu-ccache
          max-size: 5G

      # KernelSU Next 已内置，无需额外集成步骤

      - name: 应用 Droidspaces non-GKI 补丁
        working-directory: joan-kernelsu
        run: |
          wget -q -O d1.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/non-GKI/01.fix_kernel_panic_in_xt_qtaguid.patch
          wget -q -O d2.patch "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/non-GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch"
          patch -p1 < d1.patch
          patch -p1 < d2.patch
          echo "✅ Droidspaces 补丁已应用"

      - name: 创建 Droidspaces 配置片段
        working-directory: joan-kernelsu
        run: |
          cat > arch/arm64/configs/droidspaces.config << 'DROIDCFG'

# ==================== IPC ====================
CONFIG_SYSCTL=y
CONFIG_SYSVIPC=y
CONFIG_POSIX_MQUEUE=y

# ==================== 命名空间 ====================
CONFIG_NAMESPACES=y
CONFIG_IPC_NS=y
CONFIG_PID_NS=y
CONFIG_UTS_NS=y
CONFIG_USER_NS=y
CONFIG_NET_NS=y

# ==================== Cgroup 完整支持 ====================
CONFIG_CGROUPS=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_CGROUP_SCHED=y
CONFIG_FAIR_GROUP_SCHED=y
CONFIG_CGROUP_NET_PRIO=y
CONFIG_MEMCG=y
CONFIG_CPUSETS=y

# ==================== 设备文件系统 ====================
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y

# ==================== 网络隔离（Droidspaces 核心） ====================
CONFIG_VETH=y
CONFIG_BRIDGE=y
CONFIG_BRIDGE_NETFILTER=y
CONFIG_NETFILTER=y
CONFIG_NETFILTER_ADVANCED=y
CONFIG_NF_CONNTRACK=y
CONFIG_NF_NAT=y
CONFIG_NF_TABLES=y
CONFIG_IP_NF_IPTABLES=y
CONFIG_IP_NF_FILTER=y
CONFIG_IP_NF_NAT=y
CONFIG_IP_NF_TARGET_MASQUERADE=y
CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y
CONFIG_NETFILTER_XT_TARGET_TCPMSS=y
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
CONFIG_NETFILTER_XT_MATCH_STATE=y
CONFIG_NF_CONNTRACK_NETLINK=y
CONFIG_NF_NAT_REDIRECT=y
CONFIG_IP_ADVANCED_ROUTER=y
CONFIG_IP_MULTIPLE_TABLES=y
CONFIG_NF_CONNTRACK_IPV4=y
CONFIG_NF_NAT_IPV4=y

# ==================== 文件系统 ====================
CONFIG_OVERLAY_FS=y
CONFIG_EXT4_FS=y
CONFIG_EXT4_FS_POSIX_ACL=y
CONFIG_TMPFS=y
CONFIG_TMPFS_XATTR=y
CONFIG_TMPFS_POSIX_ACL=y

# ==================== Firmware 加载 ====================
CONFIG_FW_LOADER=y
CONFIG_FW_LOADER_USER_HELPER=y

# ==================== 安全 ====================
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

# ==================== 关键修复 ====================
CONFIG_ANDROID_PARANOID_NETWORK=n
DROIDCFG
          echo "✅ Droidspaces 配置片段已创建"

      - name: 合并配置并解析依赖
        working-directory: joan-kernelsu
        run: |
          ./scripts/kconfig/merge_config.sh -m -O out \
            arch/arm64/configs/msm8998_defconfig \
            arch/arm64/configs/droidspaces.config

          make ARCH=arm64 O=./out olddefconfig

          # 验证关键选项
          grep -E "CONFIG_KSU=|CONFIG_NETFILTER=|CONFIG_NAMESPACES=|CONFIG_CGROUPS=" out/.config
          echo "✅ 配置合并完成"

      - name: 编译内核
        working-directory: joan-kernelsu
        run: |
          make ARCH=arm64 O=./out olddefconfig   # 最终安全网
          make ARCH=arm64 O=./out \
            CROSS_COMPILE=aarch64-linux-android- \
            CC="ccache aarch64-linux-android-gcc" \
            Image.gz-dtb -j$(nproc --all) 2>&1 | tee build.log
          echo "✅ 编译完成"

      - name: 检查编译产物
        working-directory: joan-kernelsu
        run: |
          ls -lh out/arch/arm64/boot/
          file out/arch/arm64/boot/Image.gz-dtb

      - name: AnyKernel3 打包
        working-directory: joan-kernelsu
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          cat > anykernel.sh << 'AK3'
kernel.string=LG V30 Stable KSU-Next + Droidspaces $(date +%Y%m%d)
do.devicecheck=1
device.name1=joan
device.name2=H930
device.name3=H930DS
device.