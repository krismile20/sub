name: Build LG V30 Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: TosteRino/joan-kernelsu
          path: joan-kernelsu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl xz-utils \
            build-essential ccache \
            libncurses5-dev libssl-dev libelf-dev \
            bison flex bc python3 \
            clang lld llvm \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi
